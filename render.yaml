# Render.com Blueprint para deploy da API.
# Após criar conta gratuita em https://render.com basta apontar para este repositório.
services:
  - type: web
    name: iot-api-flask
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT run:app
    envVars:
      - key: HBASE_HOST
        sync: false
      - key: HBASE_PORT
        value: "9090"
      - key: HBASE_TABLE_PREFIX
        value: iot
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: OPENWEATHER_DEFAULT_CITY
        value: Curitiba,BR
      - key: THINGSPEAK_WRITE_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
